<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Calendar - matcha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka', sans-serif; }
        body { background: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .calendar-widget {
            width: 330px; 
            padding: 75px 24px 35px 24px; 
            border-radius: 36px;
            position: relative;
            user-select: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            
            border: 4px solid #A3E635;
            color: #166534;
            background-color: rgba(247, 254, 231, 0.5);
            background-image: repeating-linear-gradient(45deg, rgba(163, 230, 53, 0.1) 0, rgba(163, 230, 53, 0.1) 2px, transparent 2px, transparent 8px);
            background-size: auto;
            background-position: 0 0;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .top-accent-svg {
            position: absolute; top: -1px; left: -1px; width: calc(100% + 2px); height: auto;
            z-index: 5; pointer-events: none; border-radius: 36px 36px 0 0; overflow: hidden;
        }

        .decor-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6; }
        
        .calendar-header { text-align: center; margin-bottom: 22px; position: relative; z-index: 10; }
        .calendar-header h2 { font-size: 1.5rem; font-weight: 700; }
        
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 100%; 
            justify-items: center; align-items: center; position: relative; z-index: 10;
        }
        
        .day-name { font-weight: 600; font-size: 0.8rem; padding-bottom: 10px; text-transform: uppercase; }
        
        .day-number {
            font-size: 0.95rem; font-weight: 600; height: 34px; width: 34px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; cursor: pointer; transition: all 0.2s ease;
            background: rgba(255,255,255,0.4); position: relative; z-index: 10;
        }
        
        .empty-day { pointer-events: none; background: transparent !important; }
        
        .today {
            background-color: #84CC16 !important; color: #FFF; 
            box-shadow: 0 4px 12px rgba(132, 204, 22, 0.4);
        }
        
        .day-number:not(.today):not(.empty-day):hover {
            background-color: #ECFCCB; color: #4D7C0F; transform: scale(1.1);
        }
        
        .watermark { position: absolute; bottom: 12px; right: 22px; font-size: 0.65rem; font-weight: 600; opacity: 0.4; z-index: 10; }
    </style>
</head>
<body>
    <div class="calendar-widget">
        
                    <svg class="top-accent-svg" viewBox="0 0 330 48" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#A3E635" d="M0,0 L330,0 L330,15 C 315,15 315,35 290,35 C 265,35 265,15 240,15 C 215,15 215,45 180,45 C 145,45 145,20 120,20 C 95,20 95,40 70,40 C 45,40 45,20 0,20 Z"/>
                    </svg>
        <div class="decor-layer">
                    <svg width="40" height="40" viewBox="0 0 100 100" style="position: absolute; top: 10px; left: 15px;">
                        <path d="M10,90 C10,90 10,20 50,10 C90,10 90,50 90,50 C90,90 10,90 10,90 Z" fill="#4D7C0F" opacity="0.6"/>
                        <path d="M15,85 C15,85 15,30 50,20 C80,20 80,50 80,50 C80,85 15,85 15,85 Z" fill="#A3E635"/>
                    </svg>
                </div>

        <div class="calendar-header"><h2 id="month-year">Bulan Tahun</h2></div>
        <div class="calendar-grid" id="calendar-days"></div>
        <div class="watermark">Itsalyaesthetic</div>
    </div>
    
    <script>
        function generateCalendar() {
            const calendarDays = document.getElementById("calendar-days");
            const monthYearText = document.getElementById("month-year");
            const localDate = new Date();
            const currentYear = localDate.getFullYear();
            const currentMonth = localDate.getMonth();
            const todayDate = localDate.getDate();
            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            const daysName = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];

            monthYearText.innerText = `${months[currentMonth]} ${currentYear}`;
            calendarDays.innerHTML = "";

            daysName.forEach(day => {
                const dayNameEl = document.createElement("div");
                dayNameEl.classList.add("day-name");
                dayNameEl.innerText = day;
                calendarDays.appendChild(dayNameEl);
            });

            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptySlot = document.createElement("div");
                emptySlot.classList.add("day-number", "empty-day");
                calendarDays.appendChild(emptySlot);
            }

            for (let day = 1; day <= totalDays; day++) {
                const dayEl = document.createElement("div");
                dayEl.classList.add("day-number");
                dayEl.innerText = day;
                if (day === todayDate) dayEl.classList.add("today");
                calendarDays.appendChild(dayEl);
            }
        }
        generateCalendar();
    </script>
</body>
</html>
