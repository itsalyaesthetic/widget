<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Calendar - cookie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka', sans-serif; }
        body { background: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .calendar-widget {
            width: 280px; 
            padding: 65px 18px 25px 18px; 
            border-radius: 30px;
            position: relative;
            user-select: none;
            box-shadow: 0 12px 30px rgba(0,0,0,0.06);
            
            border: 4px solid #D97706;
            color: #78350F;
            background-color: rgba(254, 243, 199, 0.5);
            background-image: radial-gradient(rgba(146, 64, 14, 0.08) 1.5px, transparent 1.5px);
            background-size: 14px 14px;
            background-position: 0 0, 7px 7px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .top-accent-svg {
            position: absolute; top: -1px; left: -1px; width: calc(100% + 2px); height: auto;
            z-index: 5; pointer-events: none; border-radius: 30px 30px 0 0; overflow: hidden;
        }

        .decor-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6; }
        
        .calendar-header { text-align: center; margin-bottom: 16px; position: relative; z-index: 10; }
        .calendar-header h2 { font-size: 1.25rem; font-weight: 700; }
        
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 100%; 
            justify-items: center; align-items: center; position: relative; z-index: 10;
        }
        
        .day-name { font-weight: 600; font-size: 0.75rem; padding-bottom: 8px; text-transform: uppercase; }
        
        .day-number {
            font-size: 0.85rem; font-weight: 600; height: 30px; width: 30px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; cursor: pointer; transition: all 0.2s ease;
            background: rgba(255,255,255,0.4); position: relative; z-index: 10;
        }
        
        .empty-day { pointer-events: none; background: transparent !important; }
        
        .today {
            background-color: #D97706 !important; color: #FFF; 
            box-shadow: 0 4px 10px rgba(217, 119, 6, 0.4);
        }
        
        .day-number:not(.today):not(.empty-day):hover {
            background-color: #FDE68A; color: #78350F; transform: scale(1.1);
        }
        
        .watermark { position: absolute; bottom: 10px; right: 18px; font-size: 0.6rem; font-weight: 600; opacity: 0.4; z-index: 10; }
    </style>
</head>
<body>
    <div class="calendar-widget">
        
                    <svg class="top-accent-svg" viewBox="0 0 330 48" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#D97706" d="M0,0 L330,0 L330,15 C 310,15 310,40 280,40 C 250,40 250,20 220,20 C 190,20 190,45 160,45 C 130,45 130,15 100,15 C 70,15 70,35 40,35 C 10,35 10,20 0,20 Z"/>
                        <path fill="#FFF" opacity="0.3" d="M155,38 A3,3 0 0,0 163,38 A3,3 0 0,0 155,38 M275,33 A3,3 0 0,0 283,33 A3,3 0 0,0 275,33"/>
                    </svg>
        <div class="decor-layer">
                    <svg width="28" height="28" viewBox="0 0 100 100" style="position: absolute; top: 10px; left: 12px;">
                        <circle cx="50" cy="50" r="45" fill="#F59E0B"/>
                        <circle cx="30" cy="35" r="7" fill="#78350F"/>
                        <circle cx="65" cy="30" r="6" fill="#78350F"/>
                        <circle cx="45" cy="65" r="8" fill="#78350F"/>
                        <circle cx="70" cy="60" r="6" fill="#78350F"/>
                    </svg>
                </div>

        <div class="calendar-header"><h2 id="month-year">Bulan Tahun</h2></div>
        <div class="calendar-grid" id="calendar-days"></div>
        <div class="watermark">Itsalyaesthetic</div>
    </div>
    
    <script>
        function generateCalendar() {
            const calendarDays = document.getElementById("calendar-days");
            const monthYearText = document.getElementById("month-year");
            const localDate = new Date();
            const currentYear = localDate.getFullYear();
            const currentMonth = localDate.getMonth();
            const todayDate = localDate.getDate();
            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            const daysName = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];

            monthYearText.innerText = `${months[currentMonth]} ${currentYear}`;
            calendarDays.innerHTML = "";

            daysName.forEach(day => {
                const dayNameEl = document.createElement("div");
                dayNameEl.classList.add("day-name");
                dayNameEl.innerText = day;
                calendarDays.appendChild(dayNameEl);
            });

            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptySlot = document.createElement("div");
                emptySlot.classList.add("day-number", "empty-day");
                calendarDays.appendChild(emptySlot);
            }

            for (let day = 1; day <= totalDays; day++) {
                const dayEl = document.createElement("div");
                dayEl.classList.add("day-number");
                dayEl.innerText = day;
                if (day === todayDate) dayEl.classList.add("today");
                calendarDays.appendChild(dayEl);
            }
        }
        generateCalendar();
    </script>
</body>
</html>
