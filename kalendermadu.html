<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Calendar Widget - Itsalyaesthetic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
        }

        /* Latar Belakang Luar Total Transparan */
        body {
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .calendar-container {
            width: 320px; 
            padding: 70px 24px 35px 24px; 
            background-color: rgba(255, 253, 248, 0.75); 
            border: 4px solid #FFC107;
            border-radius: 36px;
            position: relative;
            color: #6D4C13;
            user-select: none;
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            
            background-image: 
                linear-gradient(30deg, rgba(255, 193, 7, 0.04) 12%, transparent 12.5%, transparent 87%, rgba(255, 193, 7, 0.04) 87.5%, rgba(255, 193, 7, 0.04)),
                linear-gradient(150deg, rgba(255, 193, 7, 0.04) 12%, transparent 12.5%, transparent 87%, rgba(255, 193, 7, 0.04) 87.5%, rgba(255, 193, 7, 0.04)),
                linear-gradient(60deg, rgba(255, 193, 7, 0.06) 25%, transparent 25.5%, transparent 75%, rgba(255, 193, 7, 0.06) 75.5%, rgba(255, 193, 7, 0.06));
            background-size: 20px 35px;
        }

        .decor-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .calendar-header {
            text-align: center;
            margin-bottom: 22px;
            position: relative;
            z-index: 3;
        }

        .calendar-header h2 {
            font-size: 1.45rem;
            font-weight: 600;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px; 
            width: 100%; 
            justify-items: center; 
            align-items: center;
            position: relative;
            z-index: 3;
        }

        .day-name {
            font-weight: 600;
            font-size: 0.8rem;
            padding-bottom: 10px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .day-number {
            font-size: 0.95rem;
            font-weight: 500;
            height: 34px;
            width: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .empty-day { pointer-events: none; }

        .today {
            background-color: #FFC107; color: #FFF; box-shadow: 0 4px 10px rgba(255, 193, 7, 0.35);
            font-weight: 600;
        }

        .day-number:not(.today):not(.empty-day):hover {
            background-color: #FFF3CD; color: #B57912;
            font-weight: 600;
        }

        .watermark {
            position: absolute;
            bottom: 12px;
            right: 22px;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <div class="decor-layer">
            <div style="position: absolute; top: 15px; left: 25px; display: flex; gap: 4px;">
                    <svg width="16" height="18" viewBox="0 0 16 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 0L15.7942 4.5V13.5L8 18L0.205771 13.5V4.5L8 0Z" fill="#FFC107"/>
                    </svg>
                    <svg width="16" height="18" viewBox="0 0 16 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="transform: translateY(6px);">
                        <path d="M8 0L15.7942 4.5V13.5L8 18L0.205771 13.5V4.5L8 0Z" fill="#FFB300"/>
                    </svg>
                    <svg width="16" height="18" viewBox="0 0 16 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 0L15.7942 4.5V13.5L8 18L0.205771 13.5V4.5L8 0Z" fill="#FFE082"/>
                    </svg>
                </div>
        </div>

        <div class="calendar-header">
            <h2 id="month-year">Bulan Tahun</h2>
        </div>
        
        <div class="calendar-grid" id="calendar-days">
            <!-- Diisi otomatis oleh JS -->
        </div>

        <div class="watermark">Itsalyaesthetic</div>
    </div>

    <script>
        function generateCalendar() {
            const calendarDays = document.getElementById("calendar-days");
            const monthYearText = document.getElementById("month-year");

            const localDate = new Date();
            const currentYear = localDate.getFullYear();
            const currentMonth = localDate.getMonth();
            const todayDate = localDate.getDate();

            const months = [
                "Januari", "Februari", "Maret", "April", "Mei", "Juni",
                "Juli", "Agustus", "September", "Oktober", "November", "Desember"
            ];

            const daysName = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];

            monthYearText.innerText = `${months[currentMonth]} ${currentYear}`;
            calendarDays.innerHTML = "";

            daysName.forEach(day => {
                const dayNameEl = document.createElement("div");
                dayNameEl.classList.add("day-name");
                dayNameEl.innerText = day;
                calendarDays.appendChild(dayNameEl);
            });

            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptySlot = document.createElement("div");
                emptySlot.classList.add("day-number", "empty-day");
                calendarDays.appendChild(emptySlot);
            }

            for (let day = 1; day <= totalDays; day++) {
                const dayEl = document.createElement("div");
                dayEl.classList.add("day-number");
                dayEl.innerText = day;

                if (day === todayDate) {
                    dayEl.classList.add("today");
                }

                calendarDays.appendChild(dayEl);
            }
        }

        generateCalendar();
    </script>
</body>
</html>
